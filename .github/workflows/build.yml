name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: 'Alpha'
  push:
    tags:
      - 'v*'

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify icon exists
        run: |
          if [ -f "build/icon.ico" ]; then
            echo "ICON_FLAG=--icon build/icon.ico"
          else
            echo "ICON_FLAG="
          fi
        id: icon_check

      - name: Build Windows executable
        run: |
          if [ -n "${{ steps.icon_check.outputs.ICON_FLAG }}" ]; then
            pyinstaller --onefile --name SimpleSnake ${{ steps.icon_check.outputs.ICON_FLAG }} --add-data "demo.png;." snake.py
          else
            pyinstaller --onefile --name SimpleSnake --add-data "demo.png;." snake.py
          fi

      - name: Verify build output
        run: |
          if [ -f "dist/SimpleSnake.exe" ]; then
            echo "Build successful!"
            ls -lh dist/SimpleSnake.exe
            file dist/SimpleSnake.exe
          else
            echo "Build failed: dist/SimpleSnake.exe not found"
            ls -la dist/
            exit 1
          fi

      - name: Rename output file
        run: mv dist/SimpleSnake.exe "dist/SimpleSnake-Windows-Alpha.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleSnake-Windows-Alpha
          path: dist/SimpleSnake-Windows-Alpha.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS app
        run: |
          pyinstaller --onefile --windowed \
            --name SimpleSnake \
            --osx-bundle-identifier com.simplesnake.app \
            --distpath dist \
            snake.py

      - name: Verify build output
        run: |
          if [ -f "dist/SimpleSnake" ]; then
            echo "Build successful!"
            ls -lh dist/SimpleSnake
            file dist/SimpleSnake
          else
            echo "Build failed: dist/SimpleSnake not found"
            ls -la dist/
            exit 1
          fi

      - name: Create .app bundle
        run: |
          APP_BUNDLE="dist/SimpleSnake.app"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          
          # Copy executable
          cp "dist/SimpleSnake" "$APP_BUNDLE/Contents/MacOS/SimpleSnake"
          chmod +x "$APP_BUNDLE/Contents/MacOS/SimpleSnake"
          
          # Copy icon if exists
          if [ -f "build/icon.icns" ]; then
            cp "build/icon.icns" "$APP_BUNDLE/Contents/Resources/icon.icns"
          fi
          
          # Create Info.plist
          cat > "$APP_BUNDLE/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>SimpleSnake</string>
              <key>CFBundleIdentifier</key>
              <string>com.simplesnake.app</string>
              <key>CFBundleName</key>
              <string>SimpleSnake</string>
              <key>CFBundleVersion</key>
              <string>Alpha</string>
              <key>CFBundleShortVersionString</key>
              <string>Alpha</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
              <key>LSApplicationCategoryType</key>
              <string>public.app-category.games</string>
          </dict>
          </plist>
          EOF
          
          echo "App bundle created:"
          ls -la "$APP_BUNDLE/Contents/"

      - name: Create .dmg
        run: |
          hdiutil create -srcfolder "dist/SimpleSnake.app" \
            -volname "SimpleSnake" \
            -format UDZO \
            -ov "dist/SimpleSnake-macOS-Alpha.dmg"
          
          if [ -f "dist/SimpleSnake-macOS-Alpha.dmg" ]; then
            echo "DMG created successfully!"
            ls -lh dist/SimpleSnake-macOS-Alpha.dmg
            hdiutil imageinfo dist/SimpleSnake-macOS-Alpha.dmg
          else
            echo "DMG creation failed"
            exit 1
          fi

      - name: Verify DMG
        run: |
          file dist/SimpleSnake-macOS-Alpha.dmg
          md5 dist/SimpleSnake-macOS-Alpha.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleSnake-macOS-Alpha
          path: dist/SimpleSnake-macOS-Alpha.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SimpleSnake-Windows-Alpha
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SimpleSnake-macOS-Alpha
          path: artifacts/macos

      - name: List downloaded artifacts
        run: |
          echo "=== Windows ==="
          ls -lh artifacts/windows/
          echo "=== macOS ==="
          ls -lh artifacts/macos/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: vAlpha
          name: SimpleSnake Alpha Release
          body: |
            ## SimpleSnake Alpha Release
            
            ### Downloads
            
            - **Windows**: `SimpleSnake-Windows-Alpha.exe`
            - **macOS**: `SimpleSnake-macOS-Alpha.dmg`
            
            ### Features
            
            - Classic snake game gameplay
            - Smooth graphics with gradient effects
            - Score tracking
            - Responsive controls (arrow keys or WASD)
            - Game over screen with restart option
            
            ### How to Play
            
            1. Download the appropriate version for your platform
            2. Run the executable/app
            3. Use arrow keys or WASD to control the snake
            4. Eat the red food to grow and increase score
            5. Avoid hitting the walls or yourself
            
            ### Platform-Specific Notes
            
            **macOS**:
            - Open the .dmg file
            - Drag SimpleSnake.app to Applications folder
            - Right-click the app and select "Open" for first-time launch
            
            **Windows**:
            - Run the .exe file directly
            - May require Visual C++ Redistributable
            
            Enjoy the game!
          draft: false
          prerelease: true
          files: |
            artifacts/windows/SimpleSnake-Windows-Alpha.exe
            artifacts/macos/SimpleSnake-macOS-Alpha.dmg
