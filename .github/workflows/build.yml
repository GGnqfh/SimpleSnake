name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: 'Alpha'
  push:
    tags:
      - 'v*'

env:
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify icon exists
        run: |
          if [ -f "build/icon.ico" ]; then
            echo "ICON_FLAG=--icon build/icon.ico"
          else
            echo "ICON_FLAG="
          fi
        id: icon_check

      - name: Build Windows executable
        run: |
          if [ -n "${{ steps.icon_check.outputs.ICON_FLAG }}" ]; then
            pyinstaller --onefile --name SimpleSnake ${{ steps.icon_check.outputs.ICON_FLAG }} --add-data "demo.png;." snake.py
          else
            pyinstaller --onefile --name SimpleSnake --add-data "demo.png;." snake.py
          fi

      - name: Verify build output
        run: |
          if [ -f "dist/SimpleSnake.exe" ]; then
            echo "Build successful!"
            ls -lh dist/SimpleSnake.exe
          else
            echo "Build failed: dist/SimpleSnake.exe not found"
            ls -la dist/
            exit 1
          fi

      - name: Rename output file
        run: mv dist/SimpleSnake.exe "dist/SimpleSnake-Windows-Alpha.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleSnake-Windows-Alpha
          path: dist/SimpleSnake-Windows-Alpha.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libfreetype6-dev \
            libportmidi-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libwebp-dev \
            python3-dev \
            wget \
            squashfs-tools \
            libfuse2 \
            fuse

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Linux executable
        run: |
          pyinstaller --onefile --name SimpleSnake --distpath dist snake.py

      - name: Verify build output
        run: |
          if [ -f "dist/SimpleSnake" ]; then
            echo "Build successful!"
            ls -lh dist/SimpleSnake
            file dist/SimpleSnake
          else
            echo "Build failed: dist/SimpleSnake not found"
            ls -la dist/
            exit 1
          fi

      - name: Create AppImage
        run: |
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          # Copy executable
          cp dist/SimpleSnake AppDir/usr/bin/
          chmod +x AppDir/usr/bin/SimpleSnake
          
          # Create desktop file
          cat > AppDir/simplesnake.desktop << EOF
          [Desktop Entry]
          Name=SimpleSnake
          Comment=Snake game built with Pygame
          Exec=SimpleSnake
          Icon=simplesnake
          Terminal=false
          Type=Application
          Categories=Game;
          Keywords=snake;game;pygame;
          EOF
          
          cp AppDir/simplesnake.desktop AppDir/usr/share/applications/
          
          # Copy icon if exists
          if [ -f "build/icon.png" ]; then
            cp build/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/simplesnake.png
          fi
          
          # Create AppRun
          cat > AppDir/AppRun << 'APPRUN_EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export PYTHONPATH="${HERE}/usr/lib/python3.11:${PYTHONPATH}"
          exec "${HERE}/usr/bin/SimpleSnake" "$@"
          APPRUN_EOF
          chmod +x AppDir/AppRun
          
          echo "AppDir structure created successfully"
          ls -la AppDir/
          ls -la AppDir/usr/bin/

      - name: Verify FUSE installation
        run: |
          echo "=== Checking FUSE installation ==="
          ls -la /lib/x86_64-linux-gnu/libfuse.so* 2>/dev/null || echo "libfuse.so not found"
          which fusermount || echo "fusermount not found"
          if [ -f "/lib/x86_64-linux-gnu/libfuse.so.2" ]; then
            echo "FUSE 2.x is installed and available"
          else
            echo "WARNING: FUSE 2.x not found, will use fallback method"
          fi

      - name: Build AppImage
        run: |
          # Download AppImageTool
          wget -q -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          
          # Build AppImage with fallback mechanism
          echo "=== Attempting to build AppImage ==="
          
          # First try direct execution
          ./appimagetool AppDir dist/SimpleSnake-Linux-Alpha.AppImage
          
          # Check if successful
          if [ -f "dist/SimpleSnake-Linux-Alpha.AppImage" ]; then
            echo "AppImage created successfully using direct execution!"
            ls -lh dist/SimpleSnake-Linux-Alpha.AppImage
          else
            echo "Direct execution failed, trying fallback method (unpack and run)"
            
            # Fallback: Unpack the appimagetool AppImage and run internal binary
            mkdir -p appimagetool_unpacked
            ./appimagetool --appimage-extract
            mv squashfs-root appimagetool_unpacked/
            
            # Run the extracted appimagetool binary
            ./appimagetool_unpacked/usr/bin/appimagetool AppDir dist/SimpleSnake-Linux-Alpha.AppImage
            
            if [ -f "dist/SimpleSnake-Linux-Alpha.AppImage" ]; then
              echo "AppImage created successfully using unpacked method!"
              ls -lh dist/SimpleSnake-Linux-Alpha.AppImage
            else
              echo "AppImage creation failed with both methods"
              exit 1
            fi
          fi

      - name: Verify AppImage
        run: |
          chmod +x dist/SimpleSnake-Linux-Alpha.AppImage
          ./dist/SimpleSnake-Linux-Alpha.AppImage --version 2>/dev/null || true
          file dist/SimpleSnake-Linux-Alpha.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleSnake-Linux-Alpha
          path: dist/SimpleSnake-Linux-Alpha.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS app
        run: |
          # Build without icon first to avoid errors
          pyinstaller --onefile --windowed \
            --name SimpleSnake \
            --osx-bundle-identifier com.simplesnake.app \
            --distpath dist \
            snake.py

      - name: Verify build output
        run: |
          if [ -f "dist/SimpleSnake" ]; then
            echo "Build successful!"
            ls -lh dist/SimpleSnake
            file dist/SimpleSnake
          else
            echo "Build failed: dist/SimpleSnake not found"
            ls -la dist/
            exit 1
          fi

      - name: Create .app bundle
        run: |
          APP_BUNDLE="dist/SimpleSnake.app"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          
          # Copy executable
          cp "dist/SimpleSnake" "$APP_BUNDLE/Contents/MacOS/SimpleSnake"
          chmod +x "$APP_BUNDLE/Contents/MacOS/SimpleSnake"
          
          # Copy icon if exists
          if [ -f "build/icon.icns" ]; then
            cp "build/icon.icns" "$APP_BUNDLE/Contents/Resources/icon.icns"
          fi
          
          # Create Info.plist
          cat > "$APP_BUNDLE/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>SimpleSnake</string>
              <key>CFBundleIdentifier</key>
              <string>com.simplesnake.app</string>
              <key>CFBundleName</key>
              <string>SimpleSnake</string>
              <key>CFBundleVersion</key>
              <string>Alpha</string>
              <key>CFBundleShortVersionString</key>
              <string>Alpha</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
              <key>LSApplicationCategoryType</key>
              <string>public.app-category.games</string>
          </dict>
          </plist>
          EOF
          
          echo "App bundle created:"
          ls -la "$APP_BUNDLE/Contents/"

      - name: Create .dmg
        run: |
          hdiutil create -srcfolder "dist/SimpleSnake.app" \
            -volname "SimpleSnake" \
            -format UDZO \
            -ov "dist/SimpleSnake-macOS-Alpha.dmg"
          
          if [ -f "dist/SimpleSnake-macOS-Alpha.dmg" ]; then
            echo "DMG created successfully!"
            ls -lh dist/SimpleSnake-macOS-Alpha.dmg
            hdiutil imageinfo dist/SimpleSnake-macOS-Alpha.dmg
          else
            echo "DMG creation failed"
            exit 1
          fi

      - name: Verify DMG
        run: |
          file dist/SimpleSnake-macOS-Alpha.dmg
          md5 dist/SimpleSnake-macOS-Alpha.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleSnake-macOS-Alpha
          path: dist/SimpleSnake-macOS-Alpha.dmg

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SimpleSnake-Windows-Alpha
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SimpleSnake-Linux-Alpha
          path: artifacts/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SimpleSnake-macOS-Alpha
          path: artifacts/macos

      - name: List downloaded artifacts
        run: |
          echo "=== Windows ==="
          ls -lh artifacts/windows/
          echo "=== Linux ==="
          ls -lh artifacts/linux/
          echo "=== macOS ==="
          ls -lh artifacts/macos/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: vAlpha
          name: SimpleSnake Alpha Release
          body: |
            ## SimpleSnake Alpha Release
            
            ### Downloads
            
            - **Windows**: `SimpleSnake-Windows-Alpha.exe`
            - **macOS**: `SimpleSnake-macOS-Alpha.dmg` 
            - **Linux**: `SimpleSnake-Linux-Alpha.AppImage`
            
            ### Features
            
            - Classic snake game gameplay
            - Smooth graphics with gradient effects
            - Score tracking
            - Responsive controls (arrow keys or WASD)
            - Game over screen with restart option
            
            ### How to Play
            
            1. Download the appropriate version for your platform
            2. Run the executable/app
            3. Use arrow keys or WASD to control the snake
            4. Eat the red food to grow and increase score
            5. Avoid hitting the walls or yourself
            
            ### Platform-Specific Notes
            
            **macOS**:
            - Open the .dmg file
            - Drag SimpleSnake.app to Applications folder
            - Right-click the app and select "Open" for first-time launch
            
            **Linux**:
            - Make executable: `chmod +x SimpleSnake-Linux-Alpha.AppImage`
            - Run: `./SimpleSnake-Linux-Alpha.AppImage`
            
            **Windows**:
            - Run the .exe file directly
            - May require Visual C++ Redistributable
            
            Enjoy the game!
          draft: false
          prerelease: true
          files: |
            artifacts/windows/SimpleSnake-Windows-Alpha.exe
            artifacts/linux/SimpleSnake-Linux-Alpha.AppImage
            artifacts/macos/SimpleSnake-macOS-Alpha.dmg
