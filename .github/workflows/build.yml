name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: 'Alpha'
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --name SimpleSnake --icon build/icon.icns --distpath dist --add-data "demo.png;." snake.py
        continue-on-error: true

      - name: Build Windows executable (no icon fallback)
        run: |
          pyinstaller --onefile --name SimpleSnake --distpath dist snake.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleSnake-Windows-Alpha
          path: dist/SimpleSnake.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller --onefile --name SimpleSnake --distpath dist snake.py

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/SimpleSnake AppDir/usr/bin/
          cat > AppDir/usr/share/applications/simplesnake.desktop << EOF
          [Desktop Entry]
          Name=SimpleSnake
          Comment=Snake game built with Pygame
          Exec=SimpleSnake
          Icon=simplesnake
          Terminal=false
          Type=Application
          Categories=Game;
          EOF
          wget -q -O appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool AppDir dist/SimpleSnake-Linux-Alpha.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleSnake-Linux-Alpha
          path: dist/SimpleSnake-Linux-Alpha.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      - name: Build macOS app
        run: |
          pyinstaller --onefile --windowed --name SimpleSnake --osx-bundle-identifier com.simplesnake.app --icon build/icon.icns --distpath dist snake.py

      - name: Create .app bundle
        run: |
          APP_BUNDLE="dist/SimpleSnake.app"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          cp "dist/SimpleSnake" "$APP_BUNDLE/Contents/MacOS/SimpleSnake"
          cp "build/icon.icns" "$APP_BUNDLE/Contents/Resources/icon.icns"
          
          cat > "$APP_BUNDLE/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>SimpleSnake</string>
              <key>CFBundleIdentifier</key>
              <string>com.simplesnake.app</string>
              <key>CFBundleName</key>
              <string>SimpleSnake</string>
              <key>CFBundleVersion</key>
              <string>Alpha</string>
              <key>CFBundleShortVersionString</key>
              <string>Alpha</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
          chmod +x "$APP_BUNDLE/Contents/MacOS/SimpleSnake"

      - name: Create .dmg
        run: |
          hdiutil create -srcfolder "dist/SimpleSnake.app" -volname "SimpleSnake" -format UDZO -ov "dist/SimpleSnake-macOS-Alpha.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleSnake-macOS-Alpha
          path: dist/SimpleSnake-macOS-Alpha.dmg

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SimpleSnake-Windows-Alpha
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SimpleSnake-Linux-Alpha
          path: artifacts/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SimpleSnake-macOS-Alpha
          path: artifacts/macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vAlpha
          name: SimpleSnake Alpha Release
          body: |
            ## SimpleSnake Alpha Release
            
            ### Downloads
            
            - **Windows**: [SimpleSnake.exe](https://github.com/${{ github.repository }}/releases/download/vAlpha/SimpleSnake-Windows-Alpha.exe)
            - **macOS**: [SimpleSnake-macOS-Alpha.dmg](https://github.com/${{ github.repository }}/releases/download/vAlpha/SimpleSnake-macOS-Alpha.dmg)
            - **Linux**: [SimpleSnake-Linux-Alpha.AppImage](https://github.com/${{ github.repository }}/releases/download/vAlpha/SimpleSnake-Linux-Alpha.AppImage)
            
            ### Features
            
            - Classic snake game gameplay
            - Smooth graphics with gradient effects
            - Score tracking
            - Responsive controls (arrow keys or WASD)
            - Game over screen with restart option
            
            ### How to Play
            
            1. Download the appropriate version for your platform
            2. Run the executable/app
            3. Use arrow keys or WASD to control the snake
            4. Eat the red food to grow and increase score
            5. Avoid hitting the walls or yourself
            
            ### Notes
            
            - Windows: Run the .exe file directly
            - macOS: Open the .dmg, drag the app to Applications
            - Linux: Make the AppImage executable and run it
            
            Enjoy the game!
          files: |
            artifacts/windows/SimpleSnake.exe
            artifacts/linux/SimpleSnake-Linux-Alpha.AppImage
            artifacts/macos/SimpleSnake-macOS-Alpha.dmg
          draft: false
          prerelease: true